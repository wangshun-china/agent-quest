name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      target_env:
        description: Target deployment environment / self-hosted runner label
        required: true
        default: aliyun
        type: choice
        options:
          - aliyun
          - wsl

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}
  APP_PORT: ${{ vars.APP_PORT || '10001' }}

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ github.event.inputs.target_env || 'aliyun' }}
    needs: build-and-push
    runs-on: [self-hosted, "${{ github.event.inputs.target_env || 'aliyun' }}"]
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-${{ github.repository }}-${{ github.event.inputs.target_env || 'aliyun' }}
      cancel-in-progress: false

    steps:
      - name: Deploy immutable image
        shell: bash
        run: |
          set -euo pipefail

          export DOCKER_CONFIG="$(mktemp -d)"
          trap 'rm -rf "$DOCKER_CONFIG"' EXIT

          printf '%s' "${{ github.token }}" |
            docker login "$GHCR_REGISTRY" -u "${{ github.actor }}" --password-stdin

          IMAGE_REPOSITORY="$GHCR_REGISTRY/$GHCR_IMAGE_NAME"
          IMAGE_REF="$IMAGE_REPOSITORY:$IMAGE_TAG"
          docker pull "$IMAGE_REF"

          port_owners="$(docker ps \
            --filter "publish=$APP_PORT" \
            --format '{{.ID}} {{.Names}} {{.Image}} {{.Ports}}')"
          if [[ -n "$port_owners" ]]; then
            echo "Port $APP_PORT is currently occupied:" >&2
            printf '%s\n' "$port_owners" >&2
            exit 1
          fi

          PROJECT_NAME="$(printf '%s' "${{ github.event.repository.name }}" |
            tr '[:upper:]' '[:lower:]' |
            sed 's/[^a-z0-9_-]/-/g')"
          DEPLOY_DIR="/opt/$PROJECT_NAME"
          mkdir -p "$DEPLOY_DIR"
          chmod 700 "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"

          cat > compose.yaml <<'COMPOSE_EOF'
          services:
            app:
              image: ${IMAGE_REF:?IMAGE_REF is required}
              restart: unless-stopped
              ports:
                - "${APP_PORT:-10001}:80"
              logging:
                driver: json-file
                options:
                  max-size: 10m
                  max-file: "3"
          COMPOSE_EOF

          export IMAGE_REF APP_PORT
          docker compose --project-name "$PROJECT_NAME" config --quiet
          docker compose --project-name "$PROJECT_NAME" up -d --remove-orphans
          docker compose --project-name "$PROJECT_NAME" ps

          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:$APP_PORT/" > /dev/null; then
              break
            fi
            if [[ "$attempt" == 30 ]]; then
              docker compose --project-name "$PROJECT_NAME" logs --tail 100 app
              exit 1
            fi
            sleep 2
          done

          mapfile -t stale_refs < <(
            docker image ls "$IMAGE_REPOSITORY" --format '{{.Repository}}:{{.Tag}}' |
              grep -Fvx "$IMAGE_REF" |
              grep -v ':<none>$' |
              sort -u || true
          )
          if (( ${#stale_refs[@]} > 0 )); then
            docker image rm -f "${stale_refs[@]}"
          fi
          docker image prune -f \
            --filter "label=org.opencontainers.image.source=https://github.com/${{ github.repository }}"

          echo "Deployment completed: $IMAGE_REF on port $APP_PORT"
